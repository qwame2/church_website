<div
  class="masonry-item group relative rounded-sm sm:rounded-2xl overflow-hidden bg-slate-900 aspect-square sm:aspect-auto transition-all duration-300 animate-slide-up"
  data-category="anagkazo"
>
  <div class="relative w-full h-full sm:h-auto">
    <video
      src="{% static 'img/VID-20250308-WA0008.mp4' %}"
      data-full="{% static 'img/VID-20250308-WA0008.mp4' %}"

      onmouseout="this.pause()"

      class="absolute inset-0 flex items-center justify-center pointer-events-none group-hover:opacity-0 transition-opacity"
    >

        class="w-12 h-12 rounded-full bg-white/30 backdrop-blur-sm flex items-center justify-center border border-white/20"
      >
        <i class="ri-play-fill text-2xl text-white"></i>
      </div>
    </div>
  </div>
</div>
