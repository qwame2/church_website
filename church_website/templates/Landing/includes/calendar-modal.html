<template x-teleport="body">
  <div
    x-show="calendarOpen"
    class="fixed inset-0 z-[200] flex items-center justify-center p-4 sm:p-6"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
  >
    <div
      class="absolute inset-0 bg-dark/60 backdrop-blur-sm"
      @click="calendarOpen = false"
    ></div>

    <div
      class="relative w-full max-w-4xl bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]"
      x-show="calendarOpen"
      x-transition:enter="transition ease-out duration-300 transform"
      x-transition:enter-start="scale-95 translate-y-4"
      x-transition:enter-end="scale-100 translate-y-0"
    >
      <div
        class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50"
      >
        <div>
          <h2 class="text-2xl font-black text-dark tracking-tight">
            Church Activities
          </h2>
          <p class="text-xs text-primary font-bold uppercase tracking-widest">
            Spiritual Movement Calendar
          </p>
        </div>
        <button
          @click="calendarOpen = false"
          class="w-10 h-10 flex items-center justify-center rounded-full bg-white shadow-sm hover:bg-red-50 hover:text-red-500 transition-colors"
        >
          <i class="ri-close-line text-2xl"></i>
        </button>
      </div>

      <div class="p-4 sm:p-8 overflow-y-auto">
        <div id="churchCalendar"></div>
      </div>
    </div>
  </div>
</template>
