<script>

    theme: {
      extend: {
        fontFamily: {
          sans: ["Outfit", "sans-serif"],
          script: ["Pacifico", "cursive"],
        },
        colors: {
          primary: "#7C3AED" /* Violet-600 */,
          secondary: "#C026D3" /* Fuchsia-600 */,
          accent: "#F59E0B" /* Amber-500 */,
          dark: "#0F172A",
        },
        animation: {
          blob: "blob 7s infinite",
          marquee: "marquee 25s linear infinite",
          "spin-slow": "spin 12s linear infinite",
          "pulse-green": "pulse-green 2s infinite",
          blink: "blink 1s infinite",
        },
        keyframes: {
          blob: {
            "0%": { transform: "translate(0px, 0px) scale(1)" },
            "33%": { transform: "translate(30px, -50px) scale(1.1)" },
            "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
            "100%": { transform: "translate(0px, 0px) scale(1)" },
          },
          marquee: {
            "0%": { transform: "translateX(0%)" },
            "100%": { transform: "translateX(-100%)" },
          },
          "pulse-green": {
            "0%": { boxShadow: "0 0 0 0 rgba(16, 185, 129, 0.7)" },
            "70%": { boxShadow: "0 0 0 6px rgba(16, 185, 129, 0)" },
            "100%": { boxShadow: "0 0 0 0 rgba(16, 185, 129, 0)" },
          },
          blink: {
            "0%, 100%": { opacity: "1" },
            "50%": { opacity: "0.3" },
          },

      },
    },
  };
</script>

<style>
  /* FullCalendar Custom Styles */
  .fc {
    font-family: "Outfit", sans-serif !important;
  }
  .fc .fc-button-primary {
    background-color: #7c3aed;
    border-color: #7c3aed;
    border-radius: 10px;
    text-transform: uppercase;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 0.5rem 1rem;
  }
  .fc .fc-button-primary:hover {
    background-color: #5b21b6;
    border-color: #5b21b6;
  }
  .fc .fc-button-primary:disabled {
    background-color: #c4b5fd;
    border-color: #c4b5fd;
  }
  .fc-toolbar-title {
    font-weight: 900 !important;
    color: #0f172a;
    font-size: 1.5rem !important;
  }
  .fc-daygrid-day-number {
    font-weight: 600;
    text-decoration: none !important;
    color: #4b5563;
  }
  .fc-event {
    border-radius: 6px !important;
    border: none !important;
    padding: 2px 4px !important;
    font-size: 0.75rem !important;
    font-weight: 600;
  }
  .fc-daygrid-event {
    margin: 1px 0 !important;
  }
  .fc-list-event {
    padding: 8px !important;
    border-radius: 8px !important;
    margin: 4px 0 !important;
  }
  .fc-day-today {
    background-color: rgba(124, 58, 237, 0.1) !important;
  }

  /* Calendar notification dot styles */
  .calendar-notification-dot {
    position: absolute;
    top: -4px;
    right: -4px;
    width: 16px;
    height: 16px;
    background: linear-gradient(135deg, #10b981, #34d399);
    border-radius: 50%;
    animation: pulse-green 2s infinite;
    box-shadow: 0 0 0 rgba(16, 185, 129, 0.4);
    z-index: 10;
    display: none;
    font-size: 10px;
    font-weight: bold;
    color: white;
    align-items: center;
    justify-content: center;
    border: 2px solid white;
  }

  /* Calendar button wrapper */
  .calendar-notification {
    position: relative;
  }

  /* Event blinking dot in calendar */
  .event-notification-dot {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 8px;
    height: 8px;
    background-color: #10b981;
    border-radius: 50%;
    animation: blink 1s infinite;
    z-index: 5;
  }
</style>

<style>
  /* Hide scrollbar for Chrome, Safari and Opera */
  .scrollbar-hide::-webkit-scrollbar {
    display: none;
  }

  /* Hide scrollbar for IE, Edge and Firefox */
  .scrollbar-hide {
    -ms-overflow-style: none; /* IE and Edge */
    scrollbar-width: none; /* Firefox */
  }

  /* Active card styles (mobile/tablet only) */
  .card-active {
    position: fixed !important;
    top: 50% !important;
    left: 50% !important;
    transform: translate(-50%, -50%) !important;
    width: calc(100vw - 2rem) !important;
    max-width: 380px !important;
    z-index: 50 !important;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important;
    border: 2px solid #4f46e5 !important;
    overflow: hidden !important;
  }

  .card-active .zoom-container {
    height: 160px !important;
  }

  .card-active > div:nth-child(2) {
    padding: 1rem !important;
    max-height: calc(100% - 160px) !important;
    overflow: hidden !important;
  }

  .card-active p {
    height: auto !important;
    -webkit-line-clamp: 3 !important;
    line-clamp: 3 !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    display: -webkit-box !important;
    -webkit-box-orient: vertical !important;
    margin-bottom: 0.75rem !important;
  }

  .card-active h3,
  .card-active .truncate {
    white-space: normal !important;
    overflow: visible !important;
    text-overflow: clip !important;
    margin-bottom: 0.5rem !important;
  }

  .card-active button[class*="py-"] {
    margin-top: auto !important;
  }

  /* Icon positioning in active state */
  .card-active [class*="absolute -top-"] {
    top: -0.5rem !important;
    right: -0.5rem !important;
    width: 2rem !important;
    height: 2rem !important;
    z-index: 60 !important;
  }

  /* Blur other cards when one is active (mobile/tablet only) */
  .cards-blur > *:not(.card-active) {
    filter: blur(4px);
    opacity: 0.7;
  }

  /* Prevent card activation on desktop */
  @media (min-width: 768px) {
    .cards-blur > *:not(.card-active) {
      filter: none !important;
      opacity: 1 !important;
    }

    .card-active {
      position: relative !important;
      top: auto !important;
      left: auto !important;
      transform: none !important;
      width: auto !important;
      max-width: none !important;
      z-index: auto !important;
      box-shadow:
        0 4px 6px -1px rgba(0, 0, 0, 0.1),
        0 2px 4px -1px rgba(0, 0, 0, 0.06) !important;
      border: 1px solid #e5e7eb !important;
      overflow: visible !important;
    }

    .card-active .zoom-container {
      height: auto !important;
    }

    .card-active p {
      -webkit-line-clamp: 2 !important;
      line-clamp: 2 !important;
    }
  }

  @keyframes float3D {
    0% {
      transform: perspective(1000px) rotateX(40deg) rotateY(-15deg) scale(1.5)
        translateZ(-20px);
      opacity: 0.15;
    }
    100% {
      transform: perspective(1000px) rotateX(20deg) rotateY(10deg) scale(1.7)
        translateZ(40px);
      opacity: 0.35;
    }
  }

  .watermark-animated {
    animation: float3D 15s ease-in-out infinite alternate;
    filter: grayscale(100%) invert(100%) brightness(200%);
  }

  /* Custom Scrollbar */
  ::-webkit-scrollbar {
    width: 10px;
  }
  ::-webkit-scrollbar-track {
    background: #f1f1f1;
  }
  ::-webkit-scrollbar-thumb {
    background: #7c3aed;
    border-radius: 5px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #5b21b6;
  }

  /* Glassmorphism Utilities */
  .glass {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.3);
  }
  .glass-dark {
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  /* Animated Background Blobs */
  .blob-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: -1;
    pointer-events: none;
  }
  .shape {
    position: absolute;
    filter: blur(70px);
    opacity: 0.4;
    animation: blob 10s infinite alternate;
  }

  /* Image Hover Zoom */
  .zoom-container {
    overflow: hidden;
  }
  .zoom-container img {
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .zoom-container:hover img {
    transform: scale(1.15);
  }

  /* Typewriter Cursor */
  .cursor {
    display: inline-block;
    width: 3px;
    background-color: white;
    animation: blink 1s infinite;
  }

  /* Progress bar animation */
  @keyframes progressFill {
    from {
      transform: scaleX(0);
    }
    to {
      transform: scaleX(1);
    }
  }

  /* Gallery line clamp */
  .line-clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .shadow-gradient {
    box-shadow:
      0 10px 40px -10px rgba(59, 130, 246, 0.1),
      0 20px 60px -20px rgba(139, 92, 246, 0.15);
  }

  .sticky {
    position: sticky;
  }
</style>
