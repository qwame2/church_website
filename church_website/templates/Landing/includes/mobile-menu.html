<template x-teleport="body">
  <div x-show="mobileMenu" class="fixed inset-0 z-[100] flex flex-col overflow-hidden">
    <!-- Overlay -->
    <div
      x-show="mobileMenu"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0"
      x-transition:enter-end="opacity-100"
      x-transition:leave="transition ease-in duration-300"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0"
      class="absolute inset-0 bg-gray-900/40 backdrop-blur-md"
      @click="mobileMenu = false"
    ></div>

    <!-- Background Decoration for panel -->
    <div
       x-show="mobileMenu"
       x-transition:enter="transition ease-out duration-500"
       x-transition:enter-start="translate-x-full"
       x-transition:enter-end="translate-x-0"
       x-transition:leave="transition ease-in duration-400"
       x-transition:leave-start="translate-x-0"
       x-transition:leave-end="translate-x-full"
       class="absolute right-0 top-0 w-[85%] max-w-sm h-full bg-white shadow-2xl overflow-hidden"
    >
       <div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/10 rounded-full blur-3xl"></div>
       <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-secondary/10 rounded-full blur-3xl"></div>
       
       <div class="relative h-full flex flex-col">
          <!-- Header -->
          <div class="p-6 flex items-center justify-between border-b border-gray-100 shadow-sm bg-white/80 backdrop-blur-sm sticky top-0 z-10">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center shadow-lg shadow-primary/20">
                <i class="ri-menu-5-line text-white text-xl"></i>
              </div>
              <div class="flex flex-col">
                <span class="text-gray-900 font-black text-lg tracking-tighter leading-none">THE CHURCH</span>
                <span class="text-[10px] text-primary font-bold tracking-[0.2em] uppercase">Navigation</span>
              </div>
            </div>
            <button
              @click="mobileMenu = false"
              class="w-10 h-10 flex items-center justify-center rounded-xl bg-gray-50 text-gray-400 hover:text-primary hover:bg-primary/5 transition-all"
            >
              <i class="ri-close-line text-2xl"></i>
            </button>
          </div>

          <!-- Menu Content -->
          <div class="flex-1 overflow-y-auto px-6 py-6 space-y-8 custom-scrollbar">
            
            <!-- Section: Main Menu -->
            <div>
              <p class="text-[10px] font-black text-gray-400 tracking-[0.2em] uppercase mb-4 px-2">Main Menu</p>
              <div class="grid grid-cols-1 gap-2">
                <a href="#home" @click="mobileMenu = false" class="flex items-center gap-4 p-3.5 rounded-2xl bg-gray-50 text-gray-700 hover:bg-primary hover:text-white transition-all group">
                  <div class="w-10 h-10 rounded-xl bg-white border border-gray-100 flex items-center justify-center group-hover:bg-white/20 group-hover:border-transparent">
                    <i class="ri-home-5-fill text-primary group-hover:text-white"></i>
                  </div>
                  <span class="text-sm font-bold">Home</span>
                </a>
                <a href="#about" @click="mobileMenu = false" class="flex items-center gap-4 p-3.5 rounded-2xl bg-gray-50 text-gray-700 hover:bg-primary hover:text-white transition-all group">
                  <div class="w-10 h-10 rounded-xl bg-white border border-gray-100 flex items-center justify-center group-hover:bg-white/20 group-hover:border-transparent">
                    <i class="ri-information-fill text-primary group-hover:text-white"></i>
                  </div>
                  <span class="text-sm font-bold">About Us</span>
                </a>
                <a href="#news-events" @click="mobileMenu = false" class="flex items-center gap-4 p-3.5 rounded-2xl bg-gray-50 text-gray-700 hover:bg-primary hover:text-white transition-all group">
                  <div class="w-10 h-10 rounded-xl bg-white border border-gray-100 flex items-center justify-center group-hover:bg-white/20 group-hover:border-transparent">
                    <i class="ri-calendar-event-fill text-primary group-hover:text-white"></i>
                  </div>
                  <span class="text-sm font-bold">News & Events</span>
                </a>
                <a href="#gallery" @click="mobileMenu = false" class="flex items-center gap-4 p-3.5 rounded-2xl bg-gray-50 text-gray-700 hover:bg-primary hover:text-white transition-all group">
                  <div class="w-10 h-10 rounded-xl bg-white border border-gray-100 flex items-center justify-center group-hover:bg-white/20 group-hover:border-transparent">
                    <i class="ri-image-2-fill text-primary group-hover:text-white"></i>
                  </div>
                  <span class="text-sm font-bold">Gallery</span>
                </a>
              </div>
            </div>

            <!-- Section: Fellowships -->
            <div>
              <p class="text-[10px] font-black text-gray-400 tracking-[0.2em] uppercase mb-4 px-2">Fellowships</p>
              <div class="grid grid-cols-2 gap-3">
                <a href="{% url 'menfellow' %}" class="flex flex-col items-center gap-2 p-4 rounded-2xl bg-blue-50/50 border border-blue-100 text-blue-700 hover:bg-blue-600 hover:text-white transition-all group text-center">
                  <i class="ri-men-line text-2xl group-hover:scale-110 transition-transform"></i>
                  <span class="text-[11px] font-black uppercase tracking-wider">Men</span>
                </a>
                <a href="{% url 'wemenfellow' %}" class="flex flex-col items-center gap-2 p-4 rounded-2xl bg-pink-50/50 border border-pink-100 text-pink-700 hover:bg-pink-600 hover:text-white transition-all group text-center">
                  <i class="ri-women-line text-2xl group-hover:scale-110 transition-transform"></i>
                  <span class="text-[11px] font-black uppercase tracking-wider">Women</span>
                </a>
                <a href="{% url 'youth' %}" class="flex flex-col items-center gap-2 p-4 rounded-2xl bg-purple-50/50 border border-purple-100 text-purple-700 hover:bg-purple-600 hover:text-white transition-all group text-center">
                  <i class="ri-user-star-line text-2xl group-hover:scale-110 transition-transform"></i>
                  <span class="text-[11px] font-black uppercase tracking-wider">Youth</span>
                </a>
                <a href="{% url 'child' %}" class="flex flex-col items-center gap-2 p-4 rounded-2xl bg-orange-50/50 border border-orange-100 text-orange-700 hover:bg-orange-600 hover:text-white transition-all group text-center">
                  <i class="ri-user-smile-line text-2xl group-hover:scale-110 transition-transform"></i>
                  <span class="text-[11px] font-black uppercase tracking-wider">Kids</span>
                </a>
              </div>
            </div>

            <!-- Section: More -->
            <div>
              <p class="text-[10px] font-black text-gray-400 tracking-[0.2em] uppercase mb-4 px-2">Explore More</p>
              <div class="space-y-2">
                <a href="{% url 'map' %}" class="flex items-center justify-between p-4 rounded-2xl bg-gray-50 text-gray-700 hover:bg-gray-100 transition-all border border-transparent hover:border-gray-200">
                  <div class="flex items-center gap-3">
                    <i class="ri-map-pin-2-line text-primary text-xl"></i>
                    <span class="text-sm font-bold">Church Location Map</span>
                  </div>
                  <i class="ri-arrow-right-s-line text-gray-400"></i>
                </a>
                <a href="{% url 'book' %}" class="flex items-center justify-between p-4 rounded-2xl bg-gray-50 text-gray-700 hover:bg-gray-100 transition-all border border-transparent hover:border-gray-200">
                  <div class="flex items-center gap-3">
                    <i class="ri-book-3-line text-primary text-xl"></i>
                    <span class="text-sm font-bold">SM Digital Library</span>
                  </div>
                  <i class="ri-arrow-right-s-line text-gray-400"></i>
                </a>
                <a href="{% url 'podcast' %}" class="flex items-center justify-between p-4 rounded-2xl bg-gray-50 text-gray-700 hover:bg-gray-100 transition-all border border-transparent hover:border-gray-200">
                  <div class="flex items-center gap-3">
                    <i class="ri-mic-2-line text-primary text-xl"></i>
                    <span class="text-sm font-bold">Sermons & Podcast</span>
                  </div>
                  <i class="ri-arrow-right-s-line text-gray-400"></i>
                </a>
                <a href="{% url 'game' %}" class="flex items-center justify-between p-4 rounded-2xl bg-gray-50 text-gray-700 hover:bg-gray-100 transition-all border border-transparent hover:border-gray-200">
                  <div class="flex items-center gap-3">
                    <i class="ri-gamepad-line text-primary text-xl"></i>
                    <span class="text-sm font-bold">Fun Zone & Games</span>
                  </div>
                  <i class="ri-arrow-right-s-line text-gray-400"></i>
                </a>
                <a href="https://wa.me/yournumber" target="_blank" class="flex items-center justify-between p-4 rounded-2xl bg-green-50/50 text-green-700 hover:bg-green-600 hover:text-white transition-all border border-green-100">
                  <div class="flex items-center gap-3">
                    <i class="ri-whatsapp-fill text-xl"></i>
                    <span class="text-sm font-bold">WhatsApp Contact</span>
                  </div>
                  <i class="ri-external-link-line opacity-50"></i>
                </a>
              </div>
            </div>

          </div>

          <!-- Footer Action -->
          <div class="p-6 bg-white border-t border-gray-100">
            <a
              href="#contact"
              @click="mobileMenu = false"
              class="flex items-center justify-center gap-3 w-full py-4 bg-gradient-to-r from-primary to-secondary text-white rounded-2xl font-black shadow-xl shadow-primary/30 active:scale-95 transition-all text-sm tracking-widest"
            >
              GET INVOLVED <i class="ri-heart-pulse-fill"></i>
            </a>
          </div>
       </div>
    </div>
  </div>
  
  <style>
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #e5e7eb;
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #d1d5db;
    }
  </style>
</template>
