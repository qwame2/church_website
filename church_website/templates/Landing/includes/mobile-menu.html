<template x-teleport="body">
  <div x-show="mobileMenu" class="fixed inset-0 z-[100] flex flex-col">
    <div
      x-show="mobileMenu"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0"
      x-transition:enter-end="opacity-100"
      x-transition:leave="transition ease-in duration-300"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0"
      class="absolute inset-0 bg-dark/80 backdrop-blur-md"
      @click="mobileMenu = false"
    ></div>

    <div
      x-show="mobileMenu"
      x-transition:enter="transition ease-out duration-500"
      x-transition:enter-start="translate-x-full"
      x-transition:enter-end="translate-x-0"
      x-transition:leave="transition ease-in duration-400"
      x-transition:leave-start="translate-x-0"
      x-transition:leave-end="translate-x-full"
      class="relative ml-auto h-full w-[85%] max-w-sm bg-dark flex flex-col shadow-2xl border-l border-white/10"
    >
      <div
        class="p-6 flex items-center justify-between border-b border-white/5"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center shadow-lg"
          >
            <i class="ri-community-fill text-white text-xl"></i>
          </div>
          <span class="text-white font-black text-xl tracking-tighter"
            >NAVIGATION</span
          >
        </div>
        <button
          @click="mobileMenu = false"
          class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 text-white/60 hover:text-white"
        >
          <i class="ri-close-line text-2xl"></i>
        </button>
      </div>

      <div class="flex-1 overflow-y-auto px-6 py-8 space-y-3">
        <a
          href="#home"
          @click="mobileMenu = false"
          class="group flex items-center gap-4 p-4 rounded-2xl bg-white/5 text-white hover:bg-primary transition-all"
        >
          <div
            class="w-10 h-10 rounded-xl bg-primary/20 flex items-center justify-center group-hover:bg-white/20"
          >
            <i class="ri-home-fill"></i>
          </div>
          <span class="text-lg font-bold">Home</span>
        </a>

        <a
          href="#about"
          @click="mobileMenu = false"
          class="group flex items-center gap-4 p-4 rounded-2xl bg-white/5 text-white hover:bg-blue-500 transition-all"
        >
          <div
            class="w-10 h-10 rounded-xl bg-blue-500/20 flex items-center justify-center group-hover:bg-white/20"
          >
            <i class="ri-information-fill"></i>
          </div>
          <span class="text-lg font-bold">About Us</span>
        </a>

        <a
          href="#events"
          @click="mobileMenu = false"
          class="group flex items-center gap-4 p-4 rounded-2xl bg-white/5 text-white hover:bg-purple-500 transition-all"
        >
          <div
            class="w-10 h-10 rounded-xl bg-purple-500/20 flex items-center justify-center group-hover:bg-white/20"
          >
            <i class="ri-calendar-event-fill"></i>
          </div>
          <span class="text-lg font-bold">Events</span>
        </a>

        <a
          href="#gallery"
          @click="mobileMenu = false"
          class="group flex items-center gap-4 p-4 rounded-2xl bg-white/5 text-white hover:bg-pink-500 transition-all"
        >
          <div
            class="w-10 h-10 rounded-xl bg-pink-500/20 flex items-center justify-center group-hover:bg-white/20"
          >
            <i class="ri-image-fill"></i>
          </div>
          <span class="text-lg font-bold">Gallery</span>
        </a>

        <a
          href="#podcast"
          @click="mobileMenu = false"
          class="group flex items-center gap-4 p-4 rounded-2xl bg-white/5 text-white hover:bg-orange-500 transition-all"
        >
          <div
            class="w-10 h-10 rounded-xl bg-orange-500/20 flex items-center justify-center group-hover:bg-white/20"
          >
            <i class="ri-mic-fill"></i>
          </div>
          <span class="text-lg font-bold">Sermons</span>
        </a>

        <div class="grid grid-cols-2 gap-3 pt-6">
          <a
            href="{% url 'map' %}"
            class="p-5 rounded-2xl bg-white/5 border border-white/10 flex flex-col gap-2 hover:border-primary transition-all"
          >
            <i class="ri-map-pin-2-fill text-primary text-2xl"></i>
            <span class="text-white font-bold text-sm">Church Map</span>
          </a>
          <a
            href="{% url 'book' %}"
            class="p-5 rounded-2xl bg-white/5 border border-white/10 flex flex-col gap-2 hover:border-secondary transition-all"
          >
            <i class="ri-book-open-fill text-secondary text-2xl"></i>
            <span class="text-white font-bold text-sm">Library</span>
          </a>
          <a
            href="#game"
            class="p-5 rounded-2xl bg-white/5 border border-white/10 flex flex-col gap-2 hover:border-accent transition-all"
          >
            <i class="ri-gamepad-fill text-accent text-2xl"></i>
            <span class="text-white font-bold text-sm">Fun Zone</span>
          </a>
          <a
            href="#"
            class="p-5 rounded-2xl bg-white/5 border border-white/10 flex flex-col gap-2 hover:border-green-400 transition-all"
          >
            <i class="ri-whatsapp-fill text-green-400 text-2xl"></i>
            <span class="text-white font-bold text-sm">Contact</span>
          </a>
        </div>
      </div>

      <div class="p-6 mt-auto bg-white/5">
        <a
          href="#contact"
          @click="mobileMenu = false"
          class="flex items-center justify-center gap-3 w-full py-4 bg-gradient-to-r from-primary to-secondary text-white rounded-2xl font-black shadow-xl shadow-primary/30 active:scale-95 transition-all"
        >
          GET INVOLVED <i class="ri-heart-3-fill"></i>
        </a>
      </div>
    </div>
  </div>
</template>
