<div
  id="newsModal"
  class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300"
>
  <div
    class="bg-white rounded-2xl max-w-2xl w-full max-h-[80vh] overflow-y-auto relative"
  >
    <button
      onclick="closeNewsModal()"
      class="absolute top-4 right-4 bg-gray-100 rounded-full p-2"
    >
      <i class="ri-close-line"></i>
    </button>
    <img
      id="newsModalImage"
      src=""
      class="w-full h-48 object-cover rounded-t-2xl"
    />
    <div class="p-8">
      <span
        id="newsModalCategory"
        class="text-primary font-bold text-xs uppercase tracking-wide"
      ></span>
      <h2
        id="newsModalTitle"
        class="text-2xl font-black text-gray-900 mt-2 mb-4"
      ></h2>
      <div id="newsModalContent" class="prose text-gray-600"></div>
    </div>
  </div>
</div>

<!-- Gallery Image Modal (Landing Page Version) -->
<div
  id="imageModal"
  class="fixed inset-0 z-[100] flex items-center justify-center p-0 opacity-0 pointer-events-none transition-all duration-500 overflow-hidden"
  x-data="{ 
    isOpen: false,
    touchStartY: 0, 
    deltaY: 0,
    isSwiping: false,
    
    open(src) {
      const img = document.getElementById('lightboxImage');
      img.src = src;
      img.style.transform = 'scale(0.5) translateY(0px)';
      img.style.opacity = '0';
      
      this.isOpen = true;
      $el.classList.remove('opacity-0', 'pointer-events-none');
      $el.classList.add('opacity-100', 'pointer-events-auto');
      document.body.style.overflow = 'hidden';
      
      setTimeout(() => {
        img.style.transform = 'scale(1) translateY(0px)';
        img.style.opacity = '1';
      }, 50);
    },
    
    close() {
      const img = document.getElementById('lightboxImage');
      img.style.transform = 'scale(0.5)';
      img.style.opacity = '0';
      
      this.isOpen = false;
      $el.classList.add('opacity-0', 'pointer-events-none');
      $el.classList.remove('opacity-100', 'pointer-events-auto');
      document.body.style.overflow = '';
      
      setTimeout(() => {
        this.deltaY = 0;
        img.style.transform = '';
      }, 500);
    },

    handleTouchStart(e) {
      this.touchStartY = e.touches[0].clientY;
      this.isSwiping = true;
      document.getElementById('lightboxImage').style.transition = 'none';
    },

    handleTouchMove(e) {
      if (!this.isSwiping) return;
      const currentY = e.touches[0].clientY;
      this.deltaY = Math.max(0, currentY - this.touchStartY);
      
      if (this.deltaY > 0) {
        const scale = 1 - Math.min(0.3, this.deltaY / 1000);
        document.getElementById('lightboxImage').style.transform = `translateY(${this.deltaY}px) scale(${scale})`;
        // Dim the background as we swipe
        const opacity = 1 - Math.min(0.5, this.deltaY / 500);
        $el.querySelector('.bg-black').style.opacity = opacity;
      }
    },

    handleTouchEnd() {
      this.isSwiping = false;
      const img = document.getElementById('lightboxImage');
      img.style.transition = 'all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
      
      if (this.deltaY > 120) {
        this.close();
      } else {
        img.style.transform = 'scale(1) translateY(0px)';
        $el.querySelector('.bg-black').style.opacity = '1';
        this.deltaY = 0;
      }
    }
  }"
  x-init="window.openImageModal = (src) => open(src); window.closeImageModal = () => close()"
  @touchstart="handleTouchStart($event)"
  @touchmove="handleTouchMove($event)"
  @touchend="handleTouchEnd()"
>
  <!-- Deep Blurred Background -->
  <div 
    class="absolute inset-0 bg-black/90 backdrop-blur-2xl transition-opacity duration-500"
    onclick="closeImageModal()"
  ></div>

  <!-- Desktop Close Button -->
  <button 
    onclick="closeImageModal()"
    class="absolute top-6 right-6 z-[110] w-12 h-12 flex items-center justify-center bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-full text-white transition-all sm:flex hidden"
  >
    <i class="ri-close-line text-2xl"></i>
  </button>

  <!-- Mobile Drag handle -->
  <div 
    class="absolute top-4 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-white/30 rounded-full sm:hidden z-[110]"
  ></div>

  <!-- Image Container with 20px padding -->
  <div class="relative w-full h-full flex items-center justify-center p-5 pointer-events-none">
    <img
      id="lightboxImage"
      src=""
      class="max-w-full max-h-full rounded-xl shadow-[0_40px_100px_-20px_rgba(0,0,0,0.9)] transition-all duration-500 pointer-events-auto object-contain"
      style="transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);"
      @click.stop
    />
  </div>
</div>
