<div
  id="newsModal"
  class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300"
>
  <div
    class="bg-white rounded-2xl max-w-2xl w-full max-h-[80vh] overflow-y-auto relative"
  >
    <button
      onclick="closeNewsModal()"
      class="absolute top-4 right-4 bg-gray-100 rounded-full p-2"
    >
      <i class="ri-close-line"></i>
    </button>
    <img
      id="newsModalImage"
      src=""
      class="w-full h-48 object-cover rounded-t-2xl"
    />
    <div class="p-8">
      <span
        id="newsModalCategory"
        class="text-primary font-bold text-xs uppercase tracking-wide"
      ></span>
      <h2
        id="newsModalTitle"
        class="text-2xl font-black text-gray-900 mt-2 mb-4"
      ></h2>
      <div id="newsModalContent" class="prose text-gray-600"></div>
    </div>
  </div>
</div>

<!-- Gallery Image Modal -->
<div
  id="imageModal"
  class="fixed inset-0 z-[100] flex items-center justify-center p-0 opacity-0 pointer-events-none transition-all duration-500 overflow-hidden"
  x-data="{ 
    isOpen: false,
    touchStartY: 0, 
    deltaY: 0,
    isSwiping: false,
    
    open(src) {
      document.getElementById('lightboxImage').src = src;
      this.isOpen = true;
      $el.classList.remove('opacity-0', 'pointer-events-none');
      $el.classList.add('opacity-100', 'pointer-events-auto');
      document.body.style.overflow = 'hidden';
      setTimeout(() => {
        document.getElementById('lightboxImage').classList.remove('scale-90');
        document.getElementById('lightboxImage').classList.add('scale-100');
      }, 50);
    },
    
    close() {
      this.isOpen = false;
      document.getElementById('lightboxImage').classList.add('scale-90');
      document.getElementById('lightboxImage').classList.remove('scale-100');
      $el.classList.add('opacity-0', 'pointer-events-none');
      $el.classList.remove('opacity-100', 'pointer-events-auto');
      document.body.style.overflow = '';
      setTimeout(() => {
        this.deltaY = 0;
        document.getElementById('lightboxImage').style.transform = '';
      }, 500);
    },

    handleTouchStart(e) {
      this.touchStartY = e.touches[0].clientY;
      this.isSwiping = true;
    },

    handleTouchMove(e) {
      if (!this.isSwiping) return;
      const currentY = e.touches[0].clientY;
      this.deltaY = Math.max(0, currentY - this.touchStartY);
      
      // Apply transform with resistance
      if (this.deltaY > 0) {
        const scale = 1 - Math.min(0.2, this.deltaY / 1000);
        document.getElementById('lightboxImage').style.transform = `translateY(${this.deltaY}px) scale(${scale})`;
      }
    },

    handleTouchEnd() {
      this.isSwiping = false;
      if (this.deltaY > 150) {
        this.close();
      } else {
        // Spring back animation
        document.getElementById('lightboxImage').style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
        document.getElementById('lightboxImage').style.transform = '';
        setTimeout(() => {
          document.getElementById('lightboxImage').style.transition = '';
        }, 400);
        this.deltaY = 0;
      }
    }
  }"
  x-init="window.openImageModal = (src) => open(src); window.closeImageModal = () => close()"
  @touchstart="handleTouchStart($event)"
  @touchmove="handleTouchMove($event)"
  @touchend="handleTouchEnd()"
>
  <!-- Deep Blurred Background -->
  <div 
    class="absolute inset-0 bg-black/70 backdrop-blur-2xl transition-opacity duration-500"
    :class="isOpen ? 'opacity-100' : 'opacity-0'"
    onclick="closeImageModal()"
  ></div>

  <!-- Desktop Close Button -->
  <button 
    onclick="closeImageModal()"
    class="absolute top-6 right-6 z-[110] w-12 h-12 flex items-center justify-center bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-full text-white transition-all sm:flex hidden"
  >
    <i class="ri-close-line text-2xl"></i>
  </button>

  <!-- Mobile Drag handle (Visual Indicator) -->
  <div 
    class="absolute top-4 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-white/30 rounded-full sm:hidden z-[110] transition-opacity duration-300"
    :class="isOpen ? 'opacity-100' : 'opacity-0'"
  ></div>

  <!-- Image Container -->
  <div class="relative w-full h-full flex items-center justify-center p-4 pointer-events-none">
    <img
      id="lightboxImage"
      src=""
      class="max-w-full max-h-[85vh] md:max-h-[90vh] rounded-xl md:rounded-2xl shadow-[0_40px_100px_-20px_rgba(0,0,0,0.8)] scale-90 transition-all duration-500 pointer-events-auto"
      style="transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);"
      @click.stop
    />
  </div>
</div>
