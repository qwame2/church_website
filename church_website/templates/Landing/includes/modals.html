<div
  id="newsModal"
  class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300"
>
  <div
    class="bg-white rounded-2xl max-w-2xl w-full max-h-[80vh] overflow-y-auto relative"
  >
    <button
      onclick="closeNewsModal()"
      class="absolute top-4 right-4 bg-gray-100 rounded-full p-2"
    >
      <i class="ri-close-line"></i>
    </button>
    <img
      id="newsModalImage"
      src=""
      class="w-full h-48 object-cover rounded-t-2xl"
    />
    <div class="p-8">
      <span
        id="newsModalCategory"
        class="text-primary font-bold text-xs uppercase tracking-wide"
      ></span>
      <h2
        id="newsModalTitle"
        class="text-2xl font-black text-gray-900 mt-2 mb-4"
      ></h2>
      <div id="newsModalContent" class="prose text-gray-600"></div>
    </div>
  </div>
</div>

<div
  id="imageModal"
  class="fixed inset-0 z-[100] flex items-center justify-center p-0 opacity-0 pointer-events-none transition-all duration-500 overflow-hidden"
  x-data="{ touchStartY: 0, touchMoveY: 0, deltaY: 0 }"
  x-on:touchstart="touchStartY = $event.touches[0].clientY; deltaY = 0"
  x-on:touchmove="touchMoveY = $event.touches[0].clientY; deltaY = Math.max(0, touchMoveY - touchStartY); if(deltaY > 50) { $el.querySelector('#lightboxImage').style.transform = `translateY(${deltaY}px) scale(${1 - Math.min(0.2, deltaY/1000)})` }"
  x-on:touchend="if(deltaY > 150) { closeImageModal() } else { $el.querySelector('#lightboxImage').style.transform = '' }; deltaY = 0"
>
  <!-- Blurred Background with click-to-close -->
  <div 
    class="absolute inset-0 bg-black/60 backdrop-blur-2xl transition-opacity duration-500"
    id="imageModalBlur"
    onclick="closeImageModal()"
  ></div>

  <!-- Close Button -->
  <button 
    onclick="closeImageModal()"
    class="absolute top-6 right-6 z-[110] w-12 h-12 flex items-center justify-center bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-full text-white transition-all sm:flex hidden"
  >
    <i class="ri-close-line text-2xl"></i>
  </button>

  <!-- Mobile Drag handle -->
  <div class="absolute top-4 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-white/30 rounded-full sm:hidden z-[110]"></div>

  <!-- Image Container -->
  <div 
    id="lightboxContainer"
    class="relative w-full h-full flex items-center justify-center p-4 pointer-events-none"
  >
    <img
      id="lightboxImage"
      src=""
      class="max-w-full max-h-[85vh] md:max-h-[90vh] rounded-xl md:rounded-2xl shadow-[0_30px_60px_-15px_rgba(0,0,0,0.7)] scale-90 transition-all duration-500 pointer-events-auto"
    />
  </div>
</div>
