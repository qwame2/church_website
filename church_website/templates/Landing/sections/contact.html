{% load static %}
<section id="contact" class="py-10 sm:py-14 md:py-20 lg:py-24 bg-gray-50">
  <div
    class="max-w-4xl mx-auto bg-white rounded-2xl sm:rounded-3xl shadow-lg sm:shadow-2xl overflow-hidden flex flex-col md:flex-row mx-4 sm:mx-6 lg:mx-auto"
    data-aos="fade-up"
  >
    <!-- Left Side - Contact Info -->
    <div
      class="md:w-1/2 bg-dark text-white p-6 sm:p-8 md:p-10 flex flex-col justify-between relative overflow-hidden"
      style="perspective: 1000px"
    >
      <div
        class="absolute top-0 right-0 w-20 h-20 sm:w-24 sm:h-24 md:w-32 md:h-32 bg-primary rounded-full filter blur-[40px] sm:blur-[50px] opacity-40 sm:opacity-50 z-10"
      ></div>

      <div
        class="absolute -bottom-16 -left-8 sm:-bottom-20 sm:-left-10 md:-bottom-24 md:-left-12 w-[200px] h-[200px] sm:w-[250px] sm:h-[250px] md:w-[300px] md:h-[300px] lg:w-[400px] lg:h-[400px] pointer-events-none select-none z-0 watermark-animated"
      >
        <img
          src="{% static 'img/logo.png' %}"
          class="w-full h-full object-contain opacity-40"
          alt="Watermark"
        />
      </div>

      <div class="relative z-10">
        <h3 class="text-xl sm:text-2xl md:text-3xl font-black mb-2">
          Let's Connect
        </h3>
        <p class="text-gray-300 text-sm sm:text-base">
          Questions? Prayer requests? Just want to say hi?
        </p>
      </div>

      <div
        class="space-y-4 sm:space-y-5 md:space-y-6 mt-6 sm:mt-8 md:mt-10 relative z-10"
      >
        <div class="flex items-center gap-3 sm:gap-4">
          <div
            class="w-9 h-9 sm:w-10 sm:h-10 bg-white/10 rounded-full flex items-center justify-center flex-shrink-0"
          >
            <i class="ri-map-pin-line text-sm sm:text-base"></i>
          </div>
          <p class="text-sm sm:text-base">Pokuasi, Ofankor</p>
        </div>
        <div class="flex items-center gap-3 sm:gap-4">
          <div
            class="w-9 h-9 sm:w-10 sm:h-10 bg-white/10 rounded-full flex items-center justify-center flex-shrink-0"
          >
            <i class="ri-phone-line text-sm sm:text-base"></i>
          </div>
          <p class="text-sm sm:text-base">(+233) 203 204 273</p>
        </div>
        <div class="flex items-center gap-3 sm:gap-4">
          <div
            class="w-9 h-9 sm:w-10 sm:h-10 bg-white/10 rounded-full flex items-center justify-center flex-shrink-0"
          >
            <i class="ri-mail-line text-sm sm:text-base"></i>
          </div>
          <p class="text-sm sm:text-base break-all">info@cocsm-garyf.org</p>
        </div>
      </div>

      <div class="flex gap-3 sm:gap-4 mt-6 sm:mt-8 md:mt-10 relative z-10">
        <a href="#" class="text-gray-300 hover:text-pink-500 transition">
          <i class="ri-instagram-line text-xl sm:text-2xl"></i>
        </a>

        <a href="#" class="text-gray-300 hover:text-white transition">
          <i class="ri-twitter-x-line text-xl sm:text-2xl"></i>
        </a>

        <a href="#" class="text-gray-300 hover:text-blue-500 transition">
          <i class="ri-facebook-circle-fill text-xl sm:text-2xl"></i>
        </a>

        <!-- WhatsApp -->
        <a
          href="https://wa.me/233XXXXXXXXX"
          target="_blank"
          class="text-gray-300 hover:text-green-400 transition"
        >
          <i class="ri-whatsapp-line text-xl sm:text-2xl"></i>
        </a>
      </div>
    </div>

    <!-- Right Side - Contact Form -->
    <div class="md:w-1/2 p-6 sm:p-8 md:p-8 lg:p-10">
      <form
        action="https://formsubmit.co/info@cocsm-garyf.org"
        method="POST"
        class="space-y-4 sm:space-y-5"
      >
        <div>
          <label
            class="block text-xs sm:text-sm font-bold text-gray-700 mb-1 sm:mb-2"
            >Name</label
          >
          <input
            type="text"
            name="name"
            class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 sm:px-4 py-3 sm:py-3.5 focus:outline-none focus:border-primary transition-colors text-sm sm:text-base"
            required
          />
        </div>
        <div>
          <label
            class="block text-xs sm:text-sm font-bold text-gray-700 mb-1 sm:mb-2"
            >Email</label
          >
          <input
            type="email"
            name="email"
            class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 sm:px-4 py-3 sm:py-3.5 focus:outline-none focus:border-primary transition-colors text-sm sm:text-base"
            required
          />
        </div>
        <div>
          <label
            class="block text-xs sm:text-sm font-bold text-gray-700 mb-1 sm:mb-2"
            >Message</label
          >
          <textarea
            name="message"
            rows="4"
            class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 sm:px-4 py-3 sm:py-3.5 focus:outline-none focus:border-primary transition-colors text-sm sm:text-base resize-none"
            required
          ></textarea>
        </div>
        <button
          type="submit"
          class="w-full bg-primary text-white font-bold py-3.5 sm:py-4 rounded-lg hover:bg-purple-700 transition-colors shadow-md sm:shadow-lg shadow-purple-500/30 text-sm sm:text-base"
        >
          Send Messagessssssssssssssss
        </button>
      </form>
    </div>
  </div>
</section>
