{% load static %}
<section class="relative py-24 lg:py-40 overflow-hidden">
  <!-- 3D Motion Church Logo Watermark - More Visible & Animated -->
  <div class="absolute inset-0 opacity-40 pointer-events-none">
    <!-- Floating 3D Logos with enhanced animation -->
    <div class="absolute inset-0 animate-slow-drift">
      <!-- Main large logo top left - faster movement -->
      <img
        src="{% static 'img/logo.png' %}"
        alt="Church Logo Watermark"
        class="absolute top-10 left-10 w-56 h-56 object-contain"
        style="
          transform-style: preserve-3d;
          animation: float3d-enhanced 18s infinite ease-in-out;
          filter: drop-shadow(0 0 20px rgba(147, 51, 234, 0.3));
        "
      />

      <!-- Medium logo bottom right - with rotation -->
      <img
        src="{% static 'img/logo.png' %}"
        alt="Church Logo Watermark"
        class="absolute bottom-20 right-10 w-72 h-72 object-contain"
        style="
          transform-style: preserve-3d;
          animation: float3d-enhanced 22s infinite ease-in-out reverse;
          filter: drop-shadow(0 0 25px rgba(147, 51, 234, 0.4));
        "
      />

      <!-- Small logo middle left - spinning effect -->
      <img
        src="{% static 'img/logo.png' %}"
        alt="Church Logo Watermark"
        class="absolute top-1/3 left-20 w-44 h-44 object-contain"
        style="
          transform-style: preserve-3d;
          animation:
            float3d-enhanced 16s infinite ease-in-out 1s,
            spin-slow 30s linear infinite;
          filter: drop-shadow(0 0 15px rgba(147, 51, 234, 0.3));
        "
      />

      <!-- Additional logos with varied animations -->
      <img
        src="{% static 'img/logo.png' %}"
        alt="Church Logo Watermark"
        class="absolute bottom-1/4 left-1/4 w-48 h-48 object-contain"
        style="
          transform-style: preserve-3d;
          animation:
            float3d-enhanced 20s infinite ease-in-out 3s,
            bounce 8s ease-in-out infinite;
          filter: drop-shadow(0 0 18px rgba(147, 51, 234, 0.35));
        "
      />

      <img
        src="{% static 'img/logo.png' %}"
        alt="Church Logo Watermark"
        class="absolute top-2/3 right-20 w-64 h-64 object-contain"
        style="
          transform-style: preserve-3d;
          animation: float3d-enhanced 24s infinite ease-in-out 2s;
          filter: drop-shadow(0 0 22px rgba(147, 51, 234, 0.4));
        "
      />

      <img
        src="{% static 'img/logo.png' %}"
        alt="Church Logo Watermark"
        class="absolute top-20 right-1/3 w-40 h-40 object-contain"
        style="
          transform-style: preserve-3d;
          animation:
            float3d-enhanced 19s infinite ease-in-out 5s,
            pulse-glow 6s ease-in-out infinite;
          filter: drop-shadow(0 0 20px rgba(147, 51, 234, 0.3));
        "
      />

      <!-- New centrally positioned animated logo -->
      <img
        src="{% static 'img/logo.png' %}"
        alt="Church Logo Watermark"
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 object-contain"
        style="
          transform-style: preserve-3d;
          animation:
            float3d-enhanced 28s infinite ease-in-out,
            spin-very-slow 50s linear infinite;
          filter: drop-shadow(0 0 40px rgba(147, 51, 234, 0.5));
        "
      />
    </div>

    <!-- Enhanced Rotating Logo Ring -->
    <div
      class="absolute inset-0 flex items-center justify-center animate-slow-rotate"
    >
      <div class="relative w-[800px] h-[800px]">
        <img
          src="{% static 'img/logo.png' %}"
          alt="Church Logo Watermark"
          class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 object-contain"
          style="
            animation:
              pulse-glow 6s ease-in-out infinite,
              rotate-self 10s linear infinite;
          "
        />
        <img
          src="{% static 'img/logo.png' %}"
          alt="Church Logo Watermark"
          class="absolute bottom-0 left-1/2 -translate-x-1/2 w-32 h-32 object-contain"
          style="
            animation:
              pulse-glow 8s ease-in-out infinite 1s,
              rotate-self 12s linear infinite reverse;
          "
        />
        <img
          src="{% static 'img/logo.png' %}"
          alt="Church Logo Watermark"
          class="absolute left-0 top-1/2 -translate-y-1/2 w-32 h-32 object-contain"
          style="
            animation:
              pulse-glow 7s ease-in-out infinite 2s,
              rotate-self 14s linear infinite;
          "
        />
        <img
          src="{% static 'img/logo.png' %}"
          alt="Church Logo Watermark"
          class="absolute right-0 top-1/2 -translate-y-1/2 w-32 h-32 object-contain"
          style="
            animation:
              pulse-glow 9s ease-in-out infinite 3s,
              rotate-self 16s linear infinite reverse;
          "
        />
      </div>
    </div>

    <!-- Diagonal floating logos -->
    <div class="absolute inset-0">
      <img
        src="{% static 'img/logo.png' %}"
        alt="Church Logo Watermark"
        class="absolute top-1/4 right-1/4 w-52 h-52 object-contain"
        style="
          animation: diagonal-float 25s ease-in-out infinite;
          filter: drop-shadow(0 0 25px rgba(147, 51, 234, 0.3));
        "
      />
      <img
        src="{% static 'img/logo.png' %}"
        alt="Church Logo Watermark"
        class="absolute bottom-1/4 left-1/3 w-60 h-60 object-contain"
        style="
          animation: diagonal-float-reverse 28s ease-in-out infinite 3s;
          filter: drop-shadow(0 0 30px rgba(147, 51, 234, 0.35));
        "
      />
    </div>
  </div>

  <!-- Enhanced animations -->
  <style>
    @keyframes float3d-enhanced {
      0%,
      100% {
        transform: translate3d(0, 0, 0) rotateX(0deg) rotateY(0deg)
          rotateZ(0deg) scale(1);
        filter: drop-shadow(0 10px 20px rgba(147, 51, 234, 0.3));
      }
      20% {
        transform: translate3d(40px, -30px, 80px) rotateX(15deg) rotateY(10deg)
          rotateZ(5deg) scale(1.1);
        filter: drop-shadow(25px 25px 35px rgba(147, 51, 234, 0.5));
      }
      40% {
        transform: translate3d(-35px, 40px, -60px) rotateX(-10deg)
          rotateY(-15deg) rotateZ(-8deg) scale(0.9);
        filter: drop-shadow(-20px -20px 30px rgba(147, 51, 234, 0.4));
      }
      60% {
        transform: translate3d(50px, 20px, 70px) rotateX(20deg) rotateY(12deg)
          rotateZ(10deg) scale(1.15);
        filter: drop-shadow(30px 15px 40px rgba(147, 51, 234, 0.55));
      }
      80% {
        transform: translate3d(-40px, -35px, -50px) rotateX(-15deg)
          rotateY(-8deg) rotateZ(-5deg) scale(0.95);
        filter: drop-shadow(-25px -10px 35px rgba(147, 51, 234, 0.45));
      }
    }

    @keyframes spin-slow {
      from {
        transform: rotateZ(0deg);
      }
      to {
        transform: rotateZ(360deg);
      }
    }

    @keyframes spin-very-slow {
      from {
        transform: rotateZ(0deg) rotateX(0deg) rotateY(0deg);
      }
      to {
        transform: rotateZ(360deg) rotateX(360deg) rotateY(360deg);
      }
    }

    @keyframes rotate-self {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes bounce {
      0%,
      100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-40px) scale(1.1);
      }
    }

    @keyframes pulse-glow {
      0%,
      100% {
        opacity: 0.4;
        filter: drop-shadow(0 0 20px rgba(147, 51, 234, 0.4));
      }
      50% {
        opacity: 0.7;
        filter: drop-shadow(0 0 40px rgba(147, 51, 234, 0.8));
      }
    }

    @keyframes diagonal-float {
      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }
      25% {
        transform: translate(50px, -50px) rotate(10deg);
      }
      50% {
        transform: translate(100px, 0) rotate(0deg);
      }
      75% {
        transform: translate(50px, 50px) rotate(-10deg);
      }
    }

    @keyframes diagonal-float-reverse {
      0%,
      100% {
        transform: translate(0, 0) rotate(0deg);
      }
      25% {
        transform: translate(-50px, 50px) rotate(-10deg);
      }
      50% {
        transform: translate(-100px, 0) rotate(0deg);
      }
      75% {
        transform: translate(-50px, -50px) rotate(10deg);
      }
    }

    @keyframes slow-rotate {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes slow-drift {
      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }
      33% {
        transform: translate(2%, 2%) scale(1.02);
      }
      66% {
        transform: translate(-2%, 2%) scale(0.98);
      }
    }

    .animate-slow-rotate {
      animation: slow-rotate 120s linear infinite;
    }

    .animate-slow-drift {
      animation: slow-drift 30s ease-in-out infinite;
    }

    /* Hover effect to pause animation */
    .animate-slow-drift img:hover {
      animation-play-state: paused;
      opacity: 0.9;
      filter: drop-shadow(0 0 60px rgba(147, 51, 234, 0.9)) !important;
      transition: all 0.3s ease;
    }

    /* Add a subtle gradient overlay to make text more readable */
    .gradient-overlay {
      background: radial-gradient(
        circle at center,
        transparent 30%,
        rgba(0, 0, 0, 0.1) 100%
      );
    }
  </style>

  <div
    class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-primary/10 via-background-light to-background-light"
  ></div>

  <!-- Optional: Add a subtle overlay to ensure text readability -->
  <div
    class="absolute inset-0 bg-white/20 backdrop-blur-[1px] pointer-events-none"
  ></div>

  <div class="relative mx-auto max-w-7xl px-4 text-center sm:px-6 lg:px-8">
    <span
      class="inline-flex items-center rounded-full bg-primary/5 border border-primary/10 px-4 py-1.5 text-xs font-semibold uppercase tracking-widest text-primary mb-8"
    >
      <i data-lucide="mic" class="w-3.5 h-3.5 mr-2"></i> New Episodes Weekly
    </span>
    <h1
      class="text-5xl font-black tracking-tight text-slate-900 sm:text-7xl lg:text-8xl font-serif"
    >
      Church <span class="text-primary italic">Podcast</span>
    </h1>
    <p
      class="mx-auto mt-8 max-w-2xl text-xl leading-8 text-slate-600 font-medium italic"
    >
      "Faith comes by hearing, and hearing by the word of God." — Romans 10:17
    </p>
    <div class="mt-12 flex flex-wrap items-center justify-center gap-6">
      <button
        class="rounded-full bg-primary px-10 py-4 text-sm font-bold text-white shadow-xl shadow-primary/20 hover:scale-105 transition-all"
      >
        Listen Now - No Login Required
      </button>
      <button
        class="rounded-full bg-white px-10 py-4 text-sm font-bold text-slate-900 shadow-sm ring-1 ring-slate-200 hover:bg-slate-50 hover:scale-105 transition-all"
      >
        View All Episodes
      </button>
    </div>
    <p
      class="mt-4 text-xs font-semibold text-slate-400 uppercase tracking-[0.2em]"
    >
      Free public access for everyone
    </p>
  </div>
</section>
