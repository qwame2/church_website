{% load static %}
<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
            colors: {
              brand: {
                50: "#f0f9ff",
                100: "#e0f2fe",
                500: "#0ea5e9",
                600: "#0284c7",
                900: "#0c4a6e",
              },
            },
            animation: {
              "fade-in": "fadeIn 0.5s ease-out forwards",
              "slide-up": "slideUp 0.5s ease-out forwards",
              blob: "blob 10s infinite",
            },
            keyframes: {
              fadeIn: {
                "0%": { opacity: "0" },
                "100%": { opacity: "1" },
              },
              slideUp: {
                "0%": { opacity: "0", transform: "translateY(20px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              blob: {
                "0%": { transform: "translate(0px, 0px) scale(1)" },
                "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                "100%": { transform: "translate(0px, 0px) scale(1)" },
              },
            },
          },
        },
      };
    </script>
    <style>
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .masonry-item {
        break-inside: avoid;
        margin-bottom: 1.5rem;
      }

      .animation-delay-2000 {
        animation-delay: 2s;
      }
      .animation-delay-4000 {
        animation-delay: 4s;
      }
      
      @media (max-width: 640px) {
        #gallery-grid {
          grid-template-columns: repeat(3, 1fr) !important;
          gap: 2px !important;
          padding: 2px !important;
          background: #f8fafc;
        }
        .masonry-item {
          margin-bottom: 0 !important;
          border-radius: 0 !important;
        }
        .masonry-item img {
          border-radius: 0 !important;
        }
        .masonry-item p, .masonry-item div.absolute {
          display: none !important; /* iPhone style: clean grid, info on tap only */
        }
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>

  <body
    class="bg-white text-slate-900 antialiased selection:bg-brand-500 selection:text-white relative min-h-screen"
  >
    <div class="fixed inset-0 -z-10 overflow-hidden bg-slate-50">
      <div
        class="absolute top-0 left-[-10%] w-[30rem] h-[30rem] bg-purple-300/30 rounded-full mix-blend-multiply filter blur-[80px] opacity-70 animate-blob"
      ></div>
      <div
        class="absolute top-0 right-[-10%] w-[30rem] h-[30rem] bg-sky-300/30 rounded-full mix-blend-multiply filter blur-[80px] opacity-70 animate-blob animation-delay-2000"
      ></div>
      <div
        class="absolute -bottom-32 left-[20%] w-[35rem] h-[35rem] bg-pink-300/30 rounded-full mix-blend-multiply filter blur-[80px] opacity-70 animate-blob animation-delay-4000"
      ></div>

      <div
        class="absolute inset-0 opacity-[0.4]"
        style="
          background-image: url(&quot;data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22 opacity=%220.1%22/%3E%3C/svg%3E&quot;);
        "
      ></div>
    </div>

    <nav
      class="fixed top-0 left-0 right-0 z-40 border-b border-white/40 bg-white/60 backdrop-blur-xl transition-all duration-300"
    >
      <div class="max-w-7xl mx-auto px-2 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16 sm:h-20">
          <div class="flex items-center gap-2 sm:gap-3">
            <div
              class="w-8 h-8 sm:w-10 sm:h-10 rounded-lg flex items-center justify-center text-white shadow-lg bg-white p-0.5"
            >
              <img
                src="{% static 'img/logo.png' %}"
                class="w-full h-full object-contain"
                alt="Logo"
              />
            </div>
            <div>
              <h1 class="text-base sm:text-xl font-bold tracking-tight text-slate-900">
                Gallery
              </h1>
              <p class="hidden sm:block text-xs text-slate-500 font-medium">Captured Moments</p>
            </div>
          </div>
          <button
            onclick="window.history.back()"
            class="group flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs sm:text-sm font-medium text-slate-600 hover:bg-white/80 hover:text-slate-900 transition-all border border-slate-200"
          >
            <i
              class="ri-arrow-left-line transition-transform group-hover:-translate-x-1"
            ></i>
            <span>Back</span>
          </button>
        </div>
      </div>
    </nav>

    <main
      class="max-w-7xl mx-auto px-0.5 sm:px-6 lg:px-8 pt-24 sm:pt-32 pb-20 relative z-10"
    >
      <div
        class="flex flex-col md:flex-row md:items-center justify-between gap-4 sm:gap-6 mb-6 sm:mb-12 animate-fade-in px-4 sm:px-0"
      >
        <div class="flex flex-nowrap overflow-x-auto scrollbar-hide gap-1.5 sm:gap-2 pb-2 sm:pb-0" id="filter-container">
          <button
            data-filter="all"
            class="filter-btn active flex-shrink-0 px-4 sm:px-5 py-2 rounded-full text-[10px] sm:text-sm font-bold transition-all duration-300 bg-slate-900 text-white shadow shadow-slate-900/20 transform hover:-translate-y-0.5"
          >
            All
          </button>
          <button
            data-filter="anagkazo"
            class="filter-btn flex-shrink-0 px-4 sm:px-5 py-2 rounded-full text-[10px] sm:text-sm font-bold transition-all duration-300 bg-white/80 backdrop-blur text-slate-600 hover:bg-white shadow-sm border border-slate-200 hover:text-brand-600 transform hover:-translate-y-0.5"
          >
            Anagkazo
          </button>
          <button
            data-filter="youthInPraise"
            class="filter-btn flex-shrink-0 px-4 sm:px-5 py-2 rounded-full text-[10px] sm:text-sm font-bold transition-all duration-300 bg-white/80 backdrop-blur text-slate-600 hover:bg-white shadow-sm border border-slate-200 hover:text-brand-600 transform hover:-translate-y-0.5"
          >
            YouthInPraise
          </button>
          <button
            data-filter="events"
            class="filter-btn flex-shrink-0 px-4 sm:px-5 py-2 rounded-full text-[10px] sm:text-sm font-bold transition-all duration-300 bg-white/80 backdrop-blur text-slate-600 hover:bg-white shadow-sm border border-slate-200 hover:text-brand-600 transform hover:-translate-y-0.5"
          >
            Events
          </button>
        </div>
        <div
          class="hidden sm:block text-sm text-slate-500 font-medium bg-white/50 px-3 py-1 rounded-full backdrop-blur-sm border border-white/20"
        >
          Showing
          <span id="count-display" class="text-slate-900 font-bold">All</span>
          items
        </div>
      </div>

      <div
        class="grid grid-cols-3 sm:grid-cols-2 lg:grid-cols-3 gap-0.5 sm:gap-6"
        id="gallery-grid"
      >
        <!-- Include all category files -->
        {% include 'Gallery/gallery_event.html' %} 
        {% include 'Gallery/gallery_youthInPraise.html' %} 
        {% include 'Gallery/gallery_anagkazo.html' %}
      </div>

      <div
        id="empty-state"
        class="hidden flex flex-col items-center justify-center py-20 text-center animate-fade-in"
      >
        <div
          class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-4"
        >
          <i class="ri-image-line text-3xl text-slate-400"></i>
        </div>
        <h3 class="text-lg font-semibold text-slate-900">No media found</h3>
        <p class="text-slate-500 max-w-xs mx-auto">
          Try selecting a different category filter.
        </p>
      </div>
    </main>

    <!-- Premium Gallery Lightbox (Standalone Page Version) -->
    <div 
      id="lightbox" 
      class="fixed inset-0 z-[100] flex items-center justify-center overflow-hidden p-0"
      x-data="galleryLightbox()"
      x-show="isOpen"
      x-cloak
      @keydown.escape.window="close()"
    >
      <!-- Deep Blurred Backdrop -->
      <div 
        class="absolute inset-0 bg-black/95 backdrop-blur-2xl transition-opacity duration-500"
        x-show="isOpen"
        x-transition:enter="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="opacity-100"
        x-transition:leave-end="opacity-0"
        @click="close()"
      ></div>

      <!-- Close Button -->
      <button 
        @click="close()"
        class="absolute top-6 right-6 z-[110] p-3 text-white/70 hover:text-white hover:bg-white/10 rounded-full transition-all sm:flex hidden"
      >
        <i class="ri-close-line text-3xl"></i>
      </button>

      <!-- Mobile Drag Handle -->
      <div class="absolute top-4 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-white/30 rounded-full sm:hidden z-[110]"></div>

      <!-- Media Wrapper with 20px padding -->
      <div 
        class="relative w-full h-full flex items-center justify-center p-5 pointer-events-none"
        @touchstart="startTouch"
        @touchmove="moveTouch"
        @touchend="endTouch"
      >
        <div 
          class="relative max-w-full max-h-full pointer-events-auto transition-all duration-500"
          id="lightbox-content"
          style="transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);"
        >
          <template x-if="!isVideo">
            <img 
              :src="mediaSrc" 
              class="max-w-full max-h-full rounded-xl shadow-2xl object-contain"
              @click.stop
            />
          </template>
          <template x-if="isVideo">
            <video 
              :src="mediaSrc" 
              class="max-w-full max-h-[80vh] rounded-xl shadow-2xl" 
              controls 
              autoplay
              @click.stop
            ></video>
          </template>
        </div>
      </div>
      
      <!-- Action Buttons -->
      <div class="absolute bottom-10 left-0 right-0 flex justify-center z-[110] px-4">
        <button
          @click="download()"
          class="flex items-center gap-2 px-8 py-3 bg-brand-600 hover:bg-brand-500 text-white rounded-full font-bold transition-all shadow-xl shadow-brand-500/20 active:scale-95"
        >
          <i class="ri-download-line text-xl"></i>
          <span>Download</span>
        </button>
      </div>
    </div>

    <script>
      // Filters
      const filterBtns = document.querySelectorAll(".filter-btn");
      const galleryItems = document.querySelectorAll(".masonry-item");
      const emptyState = document.getElementById("empty-state");
      const countDisplay = document.getElementById("count-display");

      filterBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          filterBtns.forEach((b) => {
            b.classList.remove("bg-slate-900", "text-white", "shadow-lg");
            b.classList.add(
              "bg-white/80",
              "backdrop-blur",
              "text-slate-600",
              "hover:bg-white",
              "border",
              "border-slate-200",
            );
          });
          btn.classList.remove(
            "bg-white/80",
            "backdrop-blur",
            "text-slate-600",
            "hover:bg-white",
            "border",
            "border-slate-200",
          );
          btn.classList.add("bg-slate-900", "text-white", "shadow-lg");

          const category = btn.getAttribute("data-filter");
          let visibleCount = 0;

          galleryItems.forEach((item) => {
            if (
              category === "all" ||
              item.getAttribute("data-category") === category
            ) {
              item.style.display = "block";
              item.classList.remove("animate-slide-up");
              void item.offsetWidth;
              item.classList.add("animate-slide-up");
              visibleCount++;
            } else {
              item.style.display = "none";
            }
          });

          countDisplay.textContent =
            category === "all"
              ? "All"
              : category.charAt(0).toUpperCase() + category.slice(1);
          if (visibleCount === 0) emptyState.classList.remove("hidden");
          else emptyState.classList.add("hidden");
        });
      });

      function galleryLightbox() {
        return {
          isOpen: false,
          mediaSrc: '',
          isVideo: false,
          touchStartY: 0,
          deltaY: 0,
          isSwiping: false,

          open(triggerElement) {
            const parent = triggerElement.closest(".masonry-item") || triggerElement.closest(".group");
            const media = parent.querySelector("img, video");
            this.mediaSrc = media.getAttribute("data-full") || media.src;
            this.isVideo = media.tagName === "VIDEO";
            this.isOpen = true;
            document.body.style.overflow = "hidden";
            
            // Pop effect
            this.$nextTick(() => {
              const content = document.getElementById('lightbox-content');
              content.style.transform = 'scale(0.5)';
              content.style.opacity = '0';
              setTimeout(() => {
                content.style.transform = 'scale(1)';
                content.style.opacity = '1';
              }, 50);
            });
          },

          close() {
            const content = document.getElementById('lightbox-content');
            content.style.transform = 'scale(0.5)';
            content.style.opacity = '0';
            setTimeout(() => {
              this.isOpen = false;
              this.mediaSrc = '';
              document.body.style.overflow = "";
            }, 300);
          },

          startTouch(e) {
            this.touchStartY = e.touches[0].clientY;
            this.isSwiping = true;
            document.getElementById('lightbox-content').style.transition = 'none';
          },

          moveTouch(e) {
            if (!this.isSwiping) return;
            const currentY = e.touches[0].clientY;
            this.deltaY = Math.max(0, currentY - this.touchStartY);
            if (this.deltaY > 0) {
              const scale = 1 - Math.min(0.2, this.deltaY / 1000);
              document.getElementById('lightbox-content').style.transform = `translateY(${this.deltaY}px) scale(${scale})`;
            }
          },

          endTouch() {
            this.isSwiping = false;
            const content = document.getElementById('lightbox-content');
            content.style.transition = 'all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
            if (this.deltaY > 150) {
              this.close();
            } else {
              content.style.transform = 'scale(1) translateY(0px)';
              this.deltaY = 0;
            }
          },

          download() {
            const link = document.createElement("a");
            link.href = this.mediaSrc;
            link.download = this.mediaSrc.split("/").pop();
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          }
        }
      }

      // Initializing global access for existing onclick handlers
      window.openModal = (el) => {
        const lightbox = document.getElementById('lightbox');
        if (lightbox.__x) {
          lightbox.__x.$data.open(el);
        }
      };

      function downloadMedia(triggerElement) {
        window.openModal(triggerElement);
      }
    </script>
  </body>
</html>
