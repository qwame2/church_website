    <script>
      // Sample text content - replace with your actual content
      const sampleText = `Introduction

The art of professional reading is not merely about consuming words on a page; it is an active, engaging process that transforms information into knowledge, knowledge into understanding, and understanding into wisdom. In today's information-saturated world, the ability to read effectively, critically, and efficiently has become an essential professional skill.

Chapter 1: The Foundation of Effective Reading

Effective reading begins with intention. Before you even open a document, ask yourself: What do I hope to gain from this reading? Are you seeking specific information, trying to understand a complex concept, preparing for a decision, or simply staying informed about developments in your field? Your purpose should guide your approach.

Professional reading differs from leisure reading in several key aspects. First, it is typically goal-oriented. Second, it often requires documentation—taking notes, highlighting key points, or summarizing content. Third, it frequently involves critical evaluation rather than passive acceptance of information.

The physical and mental preparation for reading is equally important. Ensure you have adequate lighting, minimize distractions, and allocate sufficient time. Mentally, adopt an active stance. Approach the text with questions, be prepared to challenge assumptions, and look for connections to what you already know.

Chapter 2: Strategies for Different Reading Purposes

Not all reading is created equal, and different purposes require different strategies. Here are several common professional reading scenarios and recommended approaches:

1. Information Scanning: When you need to quickly locate specific facts or data, use scanning techniques. Look for keywords, section headings, numbers, and formatting cues like bold or italic text.

2. Comprehensive Understanding: For complex materials where deep understanding is required, employ close reading. Read slowly, take notes, pause to reflect, and reread difficult passages.

3. Staying Current: To keep up with industry news or journal articles, develop a systematic approach. Skim abstracts and conclusions first, then read introductions and methodology if relevant.

4. Preparation for Action: When reading precedes a decision or action, focus on identifying implications, potential obstacles, and actionable recommendations.

Chapter 3: The SQ3R Method

One of the most effective systematic approaches to professional reading is the SQ3R method: Survey, Question, Read, Recite, Review.

Survey: Before reading in detail, survey the entire document. Look at the table of contents, chapter headings, subheadings, illustrations, graphs, and summaries. This provides a mental framework for understanding how information is organized.

Question: Turn headings and subheadings into questions. For example, if a section is titled "The Impact of Digital Transformation," ask yourself: "What exactly is the impact of digital transformation? How is it measured? What evidence supports these claims?" Questions create purpose and focus for your reading.

Read: Now read actively to answer your questions. Look for main ideas, supporting evidence, examples, and explanations. Pay attention to transitions and organizational cues that indicate importance or relationships between ideas.

Recite: After each section, pause and mentally recite or summarize what you've read in your own words. This reinforces memory and ensures comprehension. If you can't explain it simply, you haven't understood it fully.

Review: Once you've finished reading, review the entire document. Revisit your questions, check your understanding against the text, and consolidate key points into a coherent summary.

Chapter 4: Annotation and Note-Taking

Effective annotation transforms reading from a passive to an active process. Develop a consistent system for marking texts:

- Underline or highlight key points (but be selective—if everything is important, nothing is important)
- Use symbols in the margins: ? for questions, ! for important insights, * for key concepts, → for implications
- Write brief margin notes that summarize, question, or connect ideas

Note-taking should be equally systematic. Consider these approaches:

1. Cornell Method: Divide your page into three sections: notes, cues, and summary. This encourages organization and review.

2. Mind Mapping: Create visual diagrams that show relationships between concepts, particularly useful for complex or interconnected topics.

3. Digital Tools: Use apps that allow for highlighting, annotation, and organization of digital texts. Many offer search capabilities and cross-referencing features.

Whatever system you choose, the key is consistency and regular review. Notes you never revisit provide little value.

Chapter 5: Critical Reading and Evaluation

Professional reading requires more than comprehension—it demands evaluation. Develop these critical reading skills:

1. Identify the author's purpose and perspective. Every writer has a viewpoint, biases, and intentions. Recognizing these helps you evaluate the content more objectively.

2. Distinguish between facts and opinions. Facts are verifiable; opinions are interpretations. Both have value, but they serve different purposes.

3. Evaluate evidence and arguments. Are claims supported by data, examples, or logical reasoning? Is the evidence current, relevant, and sufficient?

4. Recognize logical fallacies. Common fallacies include ad hominem attacks (criticizing the person rather than the argument), false dichotomies (presenting only two options when more exist), and slippery slope arguments (assuming one step will inevitably lead to extreme consequences).

5. Consider alternative perspectives. How might someone with different assumptions or values interpret the same information?

Chapter 6: Managing Reading Load

Information overload is a common professional challenge. These strategies can help:

1. Prioritize ruthlessly. Not everything needs to be read, and not everything that needs to be read needs equal attention. Use the Pareto Principle: 20% of what you read will likely provide 80% of the value.

2. Develop filtering criteria. Before investing time in a document, quickly assess its relevance, credibility, and timeliness. Abstracts, introductions, and conclusions can help with this assessment.

3. Schedule dedicated reading time. Instead of trying to squeeze reading between other tasks, block out focused time for important materials. Morning hours often work best when concentration is highest.

4. Use technology strategically. RSS feeds, content aggregators, and AI-assisted summaries can help manage information flow without overwhelming you.

Chapter 7: From Reading to Application

The ultimate goal of professional reading is application. To ensure reading translates into results:

1. Create action items. As you read, note specific actions you should take based on the content.

2. Share insights. Summarize key findings for colleagues or team members. Teaching others reinforces your own understanding.

3. Integrate with existing knowledge. Connect new information to what you already know. This strengthens memory and creates a more comprehensive understanding of your field.

4. Schedule follow-up. Some readings may require revisiting after you've had time to reflect or apply initial insights. Calendar reminders can prompt this review.

Conclusion

Professional reading is a skill that improves with conscious practice. By adopting systematic approaches, developing critical evaluation skills, and focusing on application, you can transform reading from a routine task into a powerful professional advantage. In an age of information abundance, the ability to effectively process, evaluate, and apply written content may be one of the most valuable skills you cultivate.

Remember: The goal is not merely to have read, but to have understood, evaluated, and applied. Start implementing these strategies today, and watch as your professional reading becomes more efficient, effective, and impactful.`;

      // Function to format text into pages with gaps
      function formatTextIntoPages(text) {
        const words = text.split(" ");
        const pdfContent = document.getElementById("pdf-content");
        pdfContent.innerHTML = "";

        let currentPageContent = "";
        let currentWordCount = 0;
        const wordsPerPage = 350; // Adjust based on your font size and layout
        let pageNumber = 1;

        for (let i = 0; i < words.length; i++) {
          currentPageContent += words[i] + " ";
          currentWordCount++;

          // Create a new page when word limit is reached or at natural breaks
          if (currentWordCount >= wordsPerPage || i === words.length - 1) {
            const pageDiv = document.createElement("div");
            pageDiv.className = "page-content";
            pageDiv.id = `page-${pageNumber}`;

            // Add page number at bottom
            const pageContentWithNumber = `
              <div class="page-text">${currentPageContent}</div>
              <div class="page-footer mt-8 pt-4 border-t border-gray-200 dark:border-gray-700 text-center text-sm text-gray-500 dark:text-gray-400">
                Page ${pageNumber}
              </div>
            `;

            pageDiv.innerHTML = pageContentWithNumber;
            pdfContent.appendChild(pageDiv);

            // Add separator between pages (except after last page)
            if (i < words.length - 1) {
              const separator = document.createElement("div");
              separator.className = "page-separator";
              pdfContent.appendChild(separator);
            }

            // Reset for next page
            currentPageContent = "";
            currentWordCount = 0;
            pageNumber++;
          }
        }

        // Update page indicator
        document.getElementById("total-pages").textContent = pageNumber - 1;
      }

      // Function to highlight selected text
      function highlightText(color) {
        const selection = window.getSelection();
        if (selection.toString().trim() === "") {
          showToast("Please select text to highlight");
          return;
        }

        const range = selection.getRangeAt(0);
        const span = document.createElement("span");
        span.className = `highlight highlight-${color}`;
        span.textContent = selection.toString();

        // Preserve existing spans within the selection
        if (range.startContainer.parentNode.classList?.contains("highlight")) {
          const existingSpan = range.startContainer.parentNode;
          const text = document.createTextNode(existingSpan.textContent);
          existingSpan.replaceWith(text);
        }

        range.deleteContents();
        range.insertNode(span);

        // Save highlights to localStorage
        saveHighlights();
        showToast("Text highlighted");
      }

      // Function to clear all highlights
      function clearHighlights() {
        const highlights = document.querySelectorAll(".highlight");
        if (highlights.length === 0) {
          showToast("No highlights to clear");
          return;
        }

        if (confirm("Are you sure you want to clear all highlights?")) {
          highlights.forEach((highlight) => {
            const text = document.createTextNode(highlight.textContent);
            highlight.replaceWith(text);
          });
          localStorage.removeItem("highlights");
          showToast("Highlights cleared");
        }
      }

      // Function to save highlights to localStorage
      function saveHighlights() {
        const pdfContent = document.getElementById("pdf-content");
        const highlights = [];

        pdfContent.querySelectorAll(".highlight").forEach((highlight) => {
          highlights.push({
            text: highlight.textContent,
            color: highlight.className.split(" ")[1],
            page: getPageNumber(highlight),
            offset: getTextOffset(highlight),
          });
        });

        localStorage.setItem("highlights", JSON.stringify(highlights));
      }

      // Helper function to get page number
      function getPageNumber(element) {
        let currentElement = element.parentElement;
        while (currentElement && !currentElement.id.startsWith("page-")) {
          currentElement = currentElement.parentElement;
        }
        return currentElement
          ? parseInt(currentElement.id.replace("page-", ""))
          : 1;
      }

      // Helper function to get text offset
      function getTextOffset(element) {
        const range = document.createRange();
        range.selectNodeContents(element);
        const contents = range.cloneContents();
        return contents.textContent.length;
      }

      // Function to load highlights from localStorage
      function loadHighlights() {
        const highlights = JSON.parse(localStorage.getItem("highlights")) || [];

        highlights.forEach((highlight) => {
          const pageElement = document.getElementById(`page-${highlight.page}`);
          if (pageElement) {
            // This is a simplified version - in production you'd need a more robust way to restore highlights
            const textContent = pageElement.textContent;
            if (textContent.includes(highlight.text)) {
              const span = document.createElement("span");
              span.className = `highlight ${highlight.color}`;
              span.textContent = highlight.text;
              // Note: This simple replace might not work perfectly in all cases
              pageElement.innerHTML = pageElement.innerHTML.replace(
                highlight.text,
                span.outerHTML,
              );
            }
          }
        });
      }

      // Translation function
      async function translateContent(targetLang) {
        const pdfContent = document.getElementById("pdf-content");
        const originalText = pdfContent.innerText;

        if (!originalText.trim()) {
          showToast("No content to translate");
          return;
        }

        showToast(`Translating to ${getLanguageName(targetLang)}...`);

        try {
          // In a real implementation, you would call a translation API here
          // For demo purposes, we'll simulate a clean translation
          const translatedText = await cleanMockTranslation(
            originalText,
            targetLang,
          );

          pdfContent.innerHTML = translatedText;
          showToast(`Translated to ${getLanguageName(targetLang)}`);

          // Save the current language preference
          localStorage.setItem("preferredLanguage", targetLang);
        } catch (error) {
          console.error("Translation error:", error);
          showToast("Translation failed. Please try again.");
        }
      }

      // Clean mock translation function - returns text without any labels
      function cleanMockTranslation(text, targetLang) {
        return new Promise((resolve) => {
          // Simulate API delay
          setTimeout(() => {
            // Return the original text without any prefix
            // In a real implementation, this would be the actual translated text
            resolve(text);
          }, 1500);
        });
      }

      // Helper function to get language name from code
      function getLanguageName(code) {
        const languages = {
          en: "English",
          ha: "Hausa",
          ak: "Akan",
          ee: "Ewe",
          gaa: "Ga",
        };
        return languages[code] || "Unknown";
      }

      // Read Aloud and Stop Reading functionality
      let speech = null;
      let isReading = false;

      document
        .getElementById("read-aloud")
        .addEventListener("click", function () {
          if (isReading) {
            window.speechSynthesis.resume();
            return;
          }

          const textContent = document.getElementById("pdf-content").innerText;
          if (!textContent.trim()) {
            showToast("No content to read");
            return;
          }

          if (speech) {
            window.speechSynthesis.cancel();
          }

          speech = new SpeechSynthesisUtterance(textContent);
          speech.onend = function () {
            isReading = false;
            document.getElementById("read-aloud").innerHTML =
              `<i class='bx bxs-volume-full'></i>`;
          };

          // Configure voice
          const voices = window.speechSynthesis.getVoices();
          const preferredVoice = voices.find((voice) =>
            voice.name.includes("English"),
          );
          if (preferredVoice) {
            speech.voice = preferredVoice;
          }
          speech.rate = 1.0;
          speech.pitch = 1.0;

          window.speechSynthesis.speak(speech);
          isReading = true;
          document.getElementById("read-aloud").innerHTML =
            `<i class='bx bx-pause'></i>`;
          showToast("Reading started");
        });

      document
        .getElementById("stop-reading")
        .addEventListener("click", function () {
          if (window.speechSynthesis.speaking) {
            window.speechSynthesis.cancel();
            isReading = false;
            document.getElementById("read-aloud").innerHTML =
              `<i class='bx bxs-volume-full'></i>`;
            showToast("Reading stopped");
          }
        });

      // Update progress bar as user scrolls
      function updateProgress() {
        const container = document.querySelector(".a4-container");
        const content = document.getElementById("pdf-content");
        const scrollPosition = container.scrollTop;
        const totalHeight = content.scrollHeight - container.clientHeight;
        const progress =
          totalHeight > 0 ? (scrollPosition / totalHeight) * 100 : 0;
        document.getElementById("progress-bar").style.width = `${progress}%`;

        // Update current page based on scroll position
        updateCurrentPage();
      }

      // Update current page number based on scroll position
      function updateCurrentPage() {
        const container = document.querySelector(".a4-container");
        const pages = document.querySelectorAll(".page-content");
        const scrollTop = container.scrollTop;
        const containerHeight = container.clientHeight;

        let currentPage = 1;

        pages.forEach((page, index) => {
          const pageTop = page.offsetTop;
          const pageBottom = pageTop + page.offsetHeight;

          // Check if page is in the middle of the viewport
          if (
            scrollTop + containerHeight / 2 >= pageTop &&
            scrollTop + containerHeight / 2 < pageBottom
          ) {
            currentPage = index + 1;
          }
        });

        document.getElementById("current-page").textContent = currentPage;
      }

      // Toast notification
      function showToast(message) {
        const toast = document.createElement("div");
        toast.className =
          "fixed bottom-20 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg text-sm animate-fade-in dark:bg-gray-700";
        toast.textContent = message;
        document.body.appendChild(toast);

        setTimeout(() => {
          toast.classList.remove("animate-fade-in");
          toast.classList.add("animate-fade-out");
          setTimeout(() => toast.remove(), 300);
        }, 2000);
      }

      // Dark mode toggle
      function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");
        const isDark = document.body.classList.contains("dark-mode");
        localStorage.setItem("darkMode", isDark);

        // Update the dark mode button icon
        const darkModeButton = document.getElementById("dark-mode-toggle");
        if (isDark) {
          darkModeButton.innerHTML = `<i class="bx bx-sun text-xl"></i>`;
          showToast("Dark mode enabled");
        } else {
          darkModeButton.innerHTML = `<i class="bx bx-moon text-xl"></i>`;
          showToast("Light mode enabled");
        }
      }

      // Check for saved preferences
      function loadPreferences() {
        // Dark mode
        if (localStorage.getItem("darkMode") === "true") {
          document.body.classList.add("dark-mode");
          document.getElementById("dark-mode-toggle").innerHTML =
            `<i class="bx bx-sun text-xl"></i>`;
        }

        // Language preference
        const preferredLanguage = localStorage.getItem("preferredLanguage");
        if (preferredLanguage && preferredLanguage !== "en") {
          translateContent(preferredLanguage);
        }
      }

      // Initialize
      window.onload = function () {
        // Format text into pages
        formatTextIntoPages(sampleText);

        // Load any saved highlights
        loadHighlights();

        // Load preferences
        loadPreferences();

        // Set up scroll listener for progress bar
        const container = document.querySelector(".a4-container");
        container.addEventListener("scroll", updateProgress);

        // Initial update
        updateProgress();

        // Add animation styles dynamically
        const style = document.createElement("style");
        style.textContent = `
          @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
          }
          @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
          }
          .animate-fade-in {
            animation: fadeIn 0.3s ease forwards;
          }
          .animate-fade-out {
            animation: fadeOut 0.3s ease forwards;
          }
        `;
        document.head.appendChild(style);
      };
    </script>
  </body>
</html>
